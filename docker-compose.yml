services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - node-api
      - python-api
    volumes:
      - ./frontend:/app
      - /app/node_modules

  node-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.node
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules

  python-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.python
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
